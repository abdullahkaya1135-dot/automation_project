      <section class="work-section sync-panel" aria-labelledby="phone-sync-heading">
        <div class="section-heading row-heading">
          <div>
            <h2 id="phone-sync-heading">Telefon Senkronizasyonu</h2>
            <p id="phone-sync-message" class="form-message" aria-live="polite"></p>
          </div>
          <div class="section-actions">
            <button id="sync-phone-outbox" type="button" class="secondary-action">Sync</button>
            <button id="export-offline-json" type="button" class="secondary-action">JSON</button>
            <button id="export-offline-csv" type="button" class="secondary-action">CSV</button>
          </div>
        </div>
        <div class="sync-counts" aria-live="polite">
          <span id="phone-pending-count" class="status-pill status-muted">Telefon bekleyen: 0</span>
          <span id="phone-server-saved-count" class="status-pill status-muted">Sunucuya kaydedilen: 0</span>
          <span id="excel-pending-count" class="status-pill status-muted">Excel bekleyen: 0</span>
        </div>
      </section>
