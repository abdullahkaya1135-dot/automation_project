<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proses Girişi Oturumu</title>
    {% include "partials/app_styles.html" %}
  </head>
  <body class="login-page">
    <main class="app-shell auth-shell">
      <header class="page-header">
        <p class="eyebrow">Mobil proses</p>
        <h1>Proses Girişi</h1>
      </header>

      <form id="login-form" class="stacked-form" novalidate>
        <div class="field">
          <label for="pin">PIN</label>
          <input
            id="pin"
            name="pin"
            type="password"
            inputmode="numeric"
            autocomplete="current-password"
            required
          >
        </div>
        <button type="submit" class="primary-action">Giriş yap</button>
        <p id="login-error" class="form-message error" role="alert" hidden></p>
      </form>
    </main>
    {% include "partials/app_script.html" %}
  </body>
</html>
