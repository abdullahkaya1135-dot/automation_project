<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proses Girişi</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header app-header">
        <div>
          <p class="eyebrow">Mobil proses</p>
          <h1>Proses Girişi</h1>
        </div>
        <div class="status-stack" aria-live="polite">
          <span id="excel-status" class="status-pill status-muted">Excel durumu</span>
          <span id="shop-order-source-status" class="status-pill status-muted">İş emri listesi</span>
          <span id="context-status" class="status-pill status-muted">Aktif tur yok</span>
        </div>
      </header>

      <section class="work-section" aria-labelledby="tour-context-heading">
        <div class="section-heading">
          <h2 id="tour-context-heading">Tur Bilgileri</h2>
          <p id="tour-context-message" class="form-message" aria-live="polite"></p>
        </div>

        <form id="tour-context-form" class="stacked-form">
          <input id="tour-context-id" name="tour_context_id" type="hidden">
          <input id="tour-date" name="date" type="hidden">
          <input id="shift" name="shift" type="hidden">

          <div class="field-grid">
            <div class="field">
              <label for="ambient-temp">Ortam sıcaklığı</label>
              <input
                id="ambient-temp"
                name="ambient_temp"
                type="text"
                inputmode="decimal"
                autocomplete="off"
                required
              >
            </div>

            <div class="field">
              <label for="production-engineer">Üretim mühendisi</label>
              <input
                id="production-engineer"
                name="production_engineer"
                type="text"
                autocomplete="name"
                required
              >
            </div>

            <div class="field">
              <label for="shift-chief">Vardiya amiri</label>
              <select id="shift-chief" name="shift_chief" required>
                <option value="">Vardiya amiri seçin</option>
                <option value="Selman">Selman</option>
                <option value="Serkan">Serkan</option>
                <option value="Hakan">Hakan</option>
              </select>
            </div>
          </div>

          <button type="submit" class="primary-action">Tur bilgilerini kaydet</button>
        </form>
      </section>

      <section class="work-section" aria-labelledby="machine-entry-heading">
        <div class="section-heading">
          <h2 id="machine-entry-heading">Makine Girişi</h2>
          <p id="entry-message" class="form-message" aria-live="polite"></p>
        </div>

        <form id="entry-form" class="stacked-form">
          <div class="field-grid">
            <div class="field span-two">
              <label for="machine-select">Makine</label>
              <select id="machine-select" name="col_f" required disabled>
                <option value="">Makine listesi yükleniyor</option>
              </select>
            </div>

            <div class="field">
              <label for="work-order">İş emri</label>
              <select id="work-order" name="col_g" required disabled>
                <option value="">İş emri listesi yükleniyor</option>
              </select>
            </div>

            <div class="field">
              <label for="total-cavity-count">Toplam Göz Sayısı</label>
              <input id="total-cavity-count" name="col_h" type="text" inputmode="decimal" autocomplete="off">
            </div>

            <div class="field">
              <label for="active-cavity-count">Çalışan göz sayısı</label>
              <input id="active-cavity-count" name="col_i" type="text" inputmode="decimal" autocomplete="off">
            </div>

            <div class="field">
              <label for="cycle-time">Çevrim Süresi</label>
              <input id="cycle-time" name="col_j" type="text" inputmode="decimal" autocomplete="off">
            </div>

            <div class="field">
              <label for="cooling-time">Soğutma Süresi</label>
              <input id="cooling-time" name="col_k" type="text" inputmode="decimal" autocomplete="off">
            </div>

            <div class="field">
              <label for="injection-time">Enjeksiyon Süresi</label>
              <input id="injection-time" name="col_l" type="text" inputmode="decimal" autocomplete="off">
            </div>

            <div class="field">
              <label for="blow-time">Üfleme Süresi</label>
              <input id="blow-time" name="col_m" type="text" inputmode="decimal" autocomplete="off">
            </div>

            <div class="field">
              <label for="conditioner-temp">Şartlandırıcı Sıcaklığı</label>
              <input id="conditioner-temp" name="col_n" type="text" inputmode="decimal" autocomplete="off">
            </div>

            <div class="field">
              <label for="dryer-temp">Kurutucu Sıcaklığı</label>
              <input id="dryer-temp" name="col_o" type="text" inputmode="decimal" autocomplete="off">
            </div>

            <div class="field">
              <label for="oven-temps">Ocak Isıları</label>
              <input id="oven-temps" name="col_p" type="text" autocomplete="off">
            </div>

            <div class="field">
              <label for="mold-temps">Kalıp Isıları</label>
              <input id="mold-temps" name="col_q" type="text" autocomplete="off">
            </div>
          </div>

          <button type="submit" class="primary-action">Girişi gönder</button>
        </form>
      </section>

      <section class="work-section" aria-labelledby="recent-submissions-heading">
        <div class="section-heading row-heading">
          <h2 id="recent-submissions-heading">Son Kayıtlar</h2>
          <button id="refresh-entries" type="button" class="secondary-action">Yenile</button>
        </div>
        <div id="recent-entries" class="entry-list" aria-live="polite">
          <p class="empty-state">Son kayıt yok.</p>
        </div>
      </section>

      <section class="work-section" aria-labelledby="pending-sync-heading">
        <div class="section-heading row-heading">
          <h2 id="pending-sync-heading">Bekleyen Excel Senkronizasyonu</h2>
          <button id="retry-sync" type="button" class="secondary-action">Tekrar dene</button>
        </div>
        <p id="sync-message" class="form-message" aria-live="polite"></p>
        <div id="pending-entries" class="entry-list" aria-live="polite">
          <p class="empty-state">Bekleyen kayıt yok.</p>
        </div>
      </section>

      <section class="work-section" aria-labelledby="cycle-report-heading">
        <div class="section-heading row-heading">
          <h2 id="cycle-report-heading">Çevrim Kontrol Raporu</h2>
          <button id="create-cycle-report" type="button" class="secondary-action">Rapor oluştur</button>
        </div>
        <p id="cycle-report-message" class="form-message" aria-live="polite"></p>
      </section>
    </main>
    <script src="/static/app.js?v=20260609-cycle-report"></script>
  </body>
</html>
